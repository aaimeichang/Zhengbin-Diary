<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Hybrid Layout</title>

<style>
body {
  margin: 0;
  background: #eaeaea;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

.container {
  position: relative;
  width: 100%;
  min-height: 100vh;
}

.card {
  position: absolute;
  width: 260px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: opacity 0.5s ease, transform 0.3s ease;
  cursor: pointer;
  /* 初始隱藏，由 JS 計算完後顯示 */
  opacity: 0; 
}

/* 固定卡片樣式 */
.card.fixed {
  opacity: 1;
  z-index: 5;
}

.card.active {
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  z-index: 100 !important;
}

.card img {
  width: 100%;
  display: block;
}

/* 懸浮標籤 */
.overlay {
  position: absolute;
  top: -15px;
  left: 20px;
  background: rgba(255,255,255,0.98);
  border: 1px solid black;
  padding: 10px;
  width: 180px;
  font-size: 11px;
  font-family: monospace;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.card.active .overlay {
  opacity: 1;
  visibility: visible;
  top: -30px;
}

/* 特定固定卡片位置 */
#hero-1 { top: 80px; left: 10%; transform: rotate(-2deg); }
#hero-2 { top: 150px; left: 50%; transform: rotate(3deg); }

/* RWD 手機版微調 */
@media (max-width: 768px) {
  .card { width: 160px; }
  .overlay { width: 120px; }
  #hero-1 { left: 5%; }
  #hero-2 { left: 45%; }
}
</style>
</head>

<body>

<div class="container" id="container">
  <div class="card fixed" id="hero-1">
    <img src="https://picsum.photos/400/300?seed=main1">
    <div class="overlay">FEATURED: BRANDING 2026</div>
  </div>

  <div class="card fixed" id="hero-2">
    <img src="https://picsum.photos/400/300?seed=main2">
    <div class="overlay">EDITORIAL: NEW VISION</div>
  </div>
</div>

<script>
/**
 * 💡 在這裡自定義你的每一張卡片內容
 * img: 圖片網址
 * title: 顯示的文字內容
 */
const projectData = [
  { img: "images/IMG_0407.jpeg", title: "第一天到住宿報到，這是接下來一個月要待的床位" },
  { img: "images/IMG_0417.jpeg", title: "工作室地點樓下的小貓，總是出現在甜點店前附近的位置" },
  { img: "images/project-03.jpg", title: "2026 攝影作品" },
  // ... 依此類推
];

const container = document.getElementById("container");
const isMobile = window.innerWidth < 768;
const cardWidth = isMobile ? 160 : 260;
const cardHeight = isMobile ? 140 : 220;
const padding = 30; // 碰撞檢查的間距

let placedBoxes = [];

// 1. 初始化固定卡片的碰撞區
document.querySelectorAll('.card.fixed').forEach(card => {
  placedBoxes.push({
    left: card.offsetLeft - padding,
    right: card.offsetLeft + cardWidth + padding,
    top: card.offsetTop - padding,
    bottom: card.offsetTop + cardHeight + padding
  });
  
  // 綁定點擊事件
  card.addEventListener('click', toggleCard);
});

// 2. 動態生成隨機卡片
projectData.forEach((item, i) => {
  const card = document.createElement("div");
  card.className = "card random";
  card.innerHTML = `
    <img src="${item.img}" loading="lazy">
    <div class="overlay">${item.title}</div>
  `;

  card.addEventListener('click', toggleCard);
  container.appendChild(card);

  // 3. 隨機排版算法 (避免碰撞)
  let placedOK = false;
  let tries = 0;
  const safeLeft = isMobile ? 15 : 100;
  const safeTop = isMobile ? 350 : 400;

  while (!placedOK && tries < 500) {
    let section = Math.floor(i / (isMobile ? 2 : 3)); 
    let rangeX = window.innerWidth - cardWidth - (safeLeft * 2);
    let x = safeLeft + Math.random() * rangeX;
    
    // 讓 y 軸根據索引分段增加，避免全部擠在頂部
    let y = safeTop + (section * (isMobile ? 220 : 350)) + (Math.random() * 100);

    let newBox = {
      left: x - padding,
      right: x + cardWidth + padding,
      top: y - padding,
      bottom: y + cardHeight + padding
    };

    // 碰撞偵測
    let collide = placedBoxes.some(box => {
      return !(newBox.right < box.left || newBox.left > box.right || 
               newBox.bottom < box.top || newBox.top > box.bottom);
    });

    if (!collide || tries === 499) {
      placedOK = true;
      let rotate = (Math.random() - 0.5) * (isMobile ? 8 : 15);
      
      card.style.left = x + "px";
      card.style.top = y + "px";
      card.style.transform = `rotate(${rotate}deg)`;
      card.style.opacity = "1";

      placedBoxes.push(newBox);
    }
    tries++;
  }
});

// 互動功能
function toggleCard(e) {
  e.stopPropagation();
  const isActive = this.classList.contains('active');
  closeAll();
  if (!isActive) this.classList.add('active');
}

function closeAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

document.addEventListener('click', closeAll);

// 自動調整容器總高度以利捲動
const maxBottom = Math.max(...placedBoxes.map(b => b.bottom), window.innerHeight);
container.style.height = (maxBottom + 100) + "px";

</script>

</body>
</html>
