<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Layout Mobile Random</title>

<style>
body {
  margin: 0;
  background: #eaeaea;
  font-family: Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

.container {
  position: relative;
  width: 100%;
  min-height: 100vh;
}

.card {
  position: absolute;
  width: 260px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: opacity 0.5s ease, transform 0.3s ease;
  cursor: pointer;

  opacity: 0;
  top: -500px;
  left: -500px;
}

.card.fixed {
  opacity: 1;
}

.card.active {
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  z-index: 50;
}

.card img {
  width: 100%;
  display: block;
}

.overlay {
  position: absolute;
  top: -15px;
  left: 20px;
  background: rgba(255,255,255,0.98);
  border: 1px solid black;
  padding: 10px;
  width: 180px;
  font-size: 11px;
  font-family: monospace;
  z-index: 10;
  pointer-events: none;

  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.card.active .overlay {
  opacity: 1;
  visibility: visible;
  top: -30px;
}

/* 固定卡片 */
.fixed:nth-of-type(1) { top: 100px; left: 15%; transform: rotate(-3deg); }
.fixed:nth-of-type(2) { top: 180px; left: 55%; transform: rotate(4deg); }

/* ✅ 手機版：保留 absolute，但縮小卡片 */
@media (max-width: 768px) {
  .card {
    width: 180px;
  }
}
</style>
</head>

<body>

<div class="container" id="container">
  <div class="card fixed">
    <img src="https://picsum.photos/400/300?1">
    <div class="overlay">HERO IMAGE A</div>
  </div>

  <div class="card fixed">
    <img src="https://picsum.photos/400/300?2">
    <div class="overlay">HERO IMAGE B</div>
  </div>
</div>

<script>
const container = document.getElementById("container");
const isMobile = window.innerWidth < 768;

const cardWidth = isMobile ? 180 : 260;
const cardHeight = isMobile ? 160 : 220;
const padding = 40;

// 資料
const data = Array.from({ length: 50 }, (_, i) => ({
  img: `https://picsum.photos/400/300?random=${i}`,
  text: `PROJECT ${i + 1}`
}));

// 建立卡片
data.forEach(item => {
  const card = document.createElement("div");
  card.className = "card random";
  card.innerHTML = `
    <img src="${item.img}" loading="lazy">
    <div class="overlay">${item.text}</div>
  `;

  card.addEventListener('click', function(e) {
    e.stopPropagation();
    if(this.classList.contains('active')) {
      this.classList.remove('active');
    } else {
      closeAllOverlays();
      this.classList.add('active');
    }
  });

  container.appendChild(card);
});

// 固定卡片事件
document.querySelectorAll('.card.fixed').forEach(card => {
  card.addEventListener('click', function(e) {
    e.stopPropagation();
    if(this.classList.contains('active')) {
      this.classList.remove('active');
    } else {
      closeAllOverlays();
      this.classList.add('active');
    }
  });
});

function closeAllOverlays() {
  document.querySelectorAll('.card.active').forEach(c => {
    c.classList.remove('active');
  });
}

document.addEventListener('click', closeAllOverlays);


// ===== 排版 =====
const randomCards = document.querySelectorAll(".card.random");
const fixedCards = document.querySelectorAll(".card.fixed");
let placedBoxes = [];

// 固定卡片加入碰撞區
fixedCards.forEach(card => {
  placedBoxes.push({
    left: card.offsetLeft - padding,
    right: card.offsetLeft + cardWidth + padding,
    top: card.offsetTop - padding,
    bottom: card.offsetTop + cardHeight + padding
  });
});

randomCards.forEach((card, i) => {
  let placedOK = false;
  let tries = 0;

  // ✅ 手機範圍限制（避免太擠）
  const safeLeft = isMobile ? 20 : 150;
  const safeTop = isMobile ? 200 : 250;

  while (!placedOK && tries < 300) {

    let section = Math.floor(i / (isMobile ? 2 : 3));

    let rangeX = window.innerWidth - cardWidth - safeLeft - 20;
    let x = safeLeft + Math.random() * Math.max(rangeX, 50);

    let y = safeTop + (section * (isMobile ? 250 : 350)) + Math.random() * 150;

    let newBox = {
      left: x - padding,
      right: x + cardWidth + padding,
      top: y - padding,
      bottom: y + cardHeight + padding
    };

    let collide = placedBoxes.some(box => {
      return !(newBox.right < box.left || newBox.left > box.right || 
               newBox.bottom < box.top || newBox.top > box.bottom);
    });

    if (!collide || tries === 299) {
      placedOK = true;

      let rotate = (Math.random() - 0.5) * (isMobile ? 6 : 10);

      card.style.left = x + "px";
      card.style.top = y + "px";
      card.style.transform = `rotate(${rotate}deg)`;
      card.style.opacity = "1";

      placedBoxes.push(newBox);
    }

    tries++;
  }
});

// 高度撐開
const maxBottom = Math.max(...placedBoxes.map(b => b.bottom), window.innerHeight);
container.style.height = (maxBottom + 200) + "px";

</script>

</body>
</html>
