<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhengbin Diary</title>

<style>
body {
  margin: 0;
  background: #eaeaea;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* 🎨 背景 Canvas */
#bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

.container {
  position: relative;
  width: 100%;
  min-height: 100vh;
}

.card {
  position: absolute;
  width: 260px;
  background: white;
  /* ❌ 已移除所有 shadow */
  transition: transform 0.3s ease; 
  cursor: pointer;
  opacity: 0; 
}

/* 固定卡片樣式：強制即時顯示且無陰影 */
.card.fixed { 
  z-index: 5; 
  opacity: 1 !important; 
}

.card.active {
  z-index: 100 !important;
}

.card img { width: 100%; display: block; }

/* 🏷️ 標籤樣式：無動畫、無平滑、直接出現 */
.overlay {
  position: absolute;
  background: rgba(255,255,255,0.98);
  border: 1px solid black;
  padding: 8px 10px;
  width: 160px;
  font-size: 11px;
  font-family: monospace;
  z-index: 10;
  pointer-events: none;
  display: none; /* 預設不顯示 */
}

/* 點擊後直接顯示 */
.card.active .overlay {
  display: block;
}

/* 標籤位置定義 */
.pos-top-left { top: -10px; left: -10px; }
.pos-top-right { top: -10px; right: -10px; }
.pos-bottom-left { bottom: -10px; left: -10px; }
.pos-bottom-right { bottom: -10px; right: -10px; }

/* 固定卡片初始位置 - 確保 CSS 優先權最高 */
#hero-1 { top: 80px; left: 10%; transform: rotate(-2deg); }
#hero-2 { top: 150px; left: 55%; transform: rotate(3deg); }

@media (max-width: 768px) {
  .card { width: 160px; }
  .overlay { width: 110px; font-size: 10px; }
}
</style>
</head>

<body>
  
<canvas id="bg-canvas"></canvas>

<div class="container" id="container">
  <div class="card fixed" id="hero-1">
    <img src="images/IMG_0407.jpeg">
    <div class="overlay pos-top-left">FEATURED: BRANDING 2026</div>
  </div>

  <div class="card fixed" id="hero-2">
    <img src="images/IMG_0417.jpeg">
    <div class="overlay pos-top-right">EDITORIAL: NEW VISION</div>
  </div>

<script>
// ===== 1. 背景海流動畫 (Ocean Flow) =====
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let lines = [];
let tick = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createLines();
}
window.addEventListener('resize', resize);
resize();

function createLines() {
  lines = [];
  const lineCount = 12; 
  for (let i = 0; i < lineCount; i++) {
    lines.push({
      y: (canvas.height / lineCount) * i,
      amplitude: Math.random() * 50 + 20,
      speed: Math.random() * 0.02 + 0.005,
      offset: Math.random() * 100,
      color: `rgba(0, 80, 150, ${Math.random() * 0.08 + 0.03})`
    });
  }
}

function drawFlow() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  tick += 0.01;
  lines.forEach(line => {
    ctx.beginPath();
    ctx.lineWidth = 1;
    ctx.strokeStyle = line.color;
    for (let x = 0; x <= canvas.width; x += 10) {
      const y = line.y + Math.sin(x * 0.002 + tick + line.offset) * line.amplitude + 
                Math.sin(x * 0.005 + tick) * (line.amplitude / 2);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
  requestAnimationFrame(drawFlow);
}
drawFlow();

  { img: "images/IMG_1035.jpeg", title: "我把切割的壓克力搬去港邊拍照，9月的太陽還是好熱，好艱辛" },
  { img: "images/IMG_1049.jpeg", title: "最後一天的床位" },
  { img: "images/IMG_1055.jpeg", title: "最後一天的工作室，要離開前與我做的手冊合照" },
  { img: "images/IMG_1056.jpeg", title: "謝謝星濱山的照顧，下次見！天氣真的超好的" },
];

const container = document.getElementById("container");
const isMobile = window.innerWidth < 768;
const cardWidth = isMobile ? 160 : 260;
const cardHeight = isMobile ? 140 : 220;
const padding = 40; 
const positions = ["pos-top-left", "pos-top-right", "pos-bottom-left", "pos-bottom-right"];

let placedBoxes = [];

// 初始化固定卡片碰撞區
document.querySelectorAll('.card.fixed').forEach(card => {
  placedBoxes.push({
    left: card.offsetLeft - padding,
    right: card.offsetLeft + cardWidth + padding,
    top: card.offsetTop - padding,
    bottom: card.offsetTop + cardHeight + padding
  });
  card.addEventListener('click', toggleCard);
});

// 生成隨機卡片
projectData.forEach((item, i) => {
  const card = document.createElement("div");
  card.className = "card random";
  const randomPos = positions[Math.floor(Math.random() * positions.length)];

  card.innerHTML = `
    <img src="${item.img}" loading="lazy">
    <div class="overlay ${randomPos}">${item.title}</div>
  `;

  card.addEventListener('click', toggleCard);
  container.appendChild(card);

  // 隨機卡片圖片載入後才淡入 (固定卡片不受此限)
  const imgElement = card.querySelector('img');
  imgElement.onload = () => {
    card.style.opacity = "1";
  };

  // 隨機算法
  let placedOK = false;
  let tries = 0;
  const safeLeft = isMobile ? 15 : 100;
  const safeTop = isMobile ? 400 : 450;

  while (!placedOK && tries < 500) {
    let section = Math.floor(i / (isMobile ? 2 : 3)); 
    let x = safeLeft + Math.random() * (window.innerWidth - cardWidth - (safeLeft * 2));
    let y = safeTop + (section * (isMobile ? 240 : 380)) + (Math.random() * 120);

    let newBox = {
      left: x - padding,
      right: x + cardWidth + padding,
      top: y - padding,
      bottom: y + cardHeight + padding
    };

    let collide = placedBoxes.some(box => {
      return !(newBox.right < box.left || newBox.left > box.right || 
               newBox.bottom < box.top || newBox.top > box.bottom);
    });

    if (!collide || tries === 499) {
      placedOK = true;
      let rotate = (Math.random() - 0.5) * (isMobile ? 10 : 18);
      card.style.left = x + "px";
      card.style.top = y + "px";
      card.style.transform = `rotate(${rotate}deg)`;
      placedBoxes.push(newBox);
    }
    tries++;
  }
});

function toggleCard(e) {
  e.stopPropagation();
  const isActive = this.classList.contains('active');
  closeAll();
  if (!isActive) this.classList.add('active');
}

function closeAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

document.addEventListener('click', closeAll);

const maxBottom = Math.max(...placedBoxes.map(b => b.bottom), window.innerHeight);
container.style.height = (maxBottom + 150) + "px";

</script>
