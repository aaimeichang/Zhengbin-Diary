<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhengbin Diary | Flat Design</title>

<style>
body {
  margin: 0;
  background: #eaeaea;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

/* 🎨 背景 Canvas (你的 sin 波浪圓點邏輯) */
#bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

.container {
  position: relative;
  width: 100%;
  min-height: 100vh;
}

.card {
  position: absolute;
  width: 260px;
  background: white;
  /* 🛑 已移除所有 box-shadow */
  border: 1px solid #d0d0d0; /* 加入淡淡的邊框代替陰影，增加平板感 */
  transition: transform 0.3s ease; /* 僅保留旋轉的微調 */
  cursor: pointer;
  opacity: 0; /* 初始隱藏，圖片載入完成才顯示 (針對隨機卡片) */
}

/* 固定卡片：即時顯示，無陰影 */
.card.fixed { 
  z-index: 5; 
  opacity: 1 !important; 
  visibility: visible !important;
  border: 2px solid black; /* 固定卡片使用較粗的黑邊框，突出重點 */
}

.card.active {
  /* 🛑 已移除 active 時的陰影 */
  border: 2px solid black; /* 點擊後強化邊框 */
  z-index: 100 !important;
}

.card img { width: 100%; display: block; }

/* 🏷️ 標籤樣式：瞬間彈出，無平滑，無陰影 */
.overlay {
  position: absolute;
  background: rgba(255,255,255,0.98);
  border: 1px solid black;
  padding: 8px 10px;
  width: 160px;
  font-size: 11px;
  font-family: monospace;
  z-index: 10;
  pointer-events: none;
  
  /* 預設隱藏 (使用 display 達到瞬间彈出) */
  display: none; 
}

/* 點擊後瞬間出現 */
.card.active .overlay {
  display: block;
}

/* 方位定位 (固定貼合邊緣，無彈跳) */
.pos-top-left { top: -10px; left: -10px; }
.pos-top-right { top: -10px; right: -10px; }
.pos-bottom-left { bottom: -10px; left: -10px; }
.pos-bottom-right { bottom: -10px; right: -10px; }

/* 固定卡片位置 (立刻出現) */
#hero-1 { top: 80px; left: 10%; transform: rotate(-2deg); }
#hero-2 { top: 150px; left: 55%; transform: rotate(3deg); }

@media (max-width: 768px) {
  .card { width: 160px; }
  .overlay { width: 110px; font-size: 10px; }
}
</style>
</head>

<body>
  
<canvas id="bg-canvas"></canvas>

<div class="container" id="container">
  <div class="card fixed" id="hero-1">
    <img src="https://picsum.photos/400/300?seed=main1">
    <div class="overlay pos-top-left">FEATURED: BRANDING 2026</div>
  </div>

  <div class="card fixed" id="hero-2">
    <img src="https://picsum.photos/400/300?seed=main2">
    <div class="overlay pos-top-right">EDITORIAL: NEW VISION</div>
  </div>
</div>

<script>
// ===== 1. 背景動畫 (你的 p5.js sin 波浪圓點邏輯翻譯版) =====
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let t = 0; // 你的時間變數

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function drawBg() {
  // 清除畫布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. 計算總共要畫多少個點 (填滿螢幕寬度)
  const spacing = 25; // 圓點間距
  const dotCount = Math.ceil(canvas.width / spacing) + 1;
  
  // 2. 畫出多層圓點波浪 (模仿海流)
  for (let layer = 0; layer < 5; layer++) {
    const layerOffset = layer * (canvas.height / 5); // 讓波浪分佈在全螢幕垂直位置
    
    for (let i = 0; i < dotCount; i++) {
      // 這是你原始程式碼的 sin 波浪邏輯：
      let x = i * spacing;
      // 我們加上 layerOffset 讓它分佈在全螢幕，並微調 sin 參數讓波浪更美
      let y = (canvas.height / 10) + layerOffset + 50 * Math.sin(i * 0.3 + t + layer);

      // 繪製圓點
      ctx.beginPath();
      // 使用半透明的藍綠色，更有海港感
      ctx.fillStyle = `rgba(0, 150, 180, ${0.15 - layer * 0.02})`; 
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 3. 你的時間增加速度
  t += 0.03; 
  
  requestAnimationFrame(drawBg);
}

drawBg();

// ===== 2. 專案資料與隨機排版 =====
const projectData = [
  { img: "images/IMG_0407.jpeg", title: "第一天到住宿報到，這是接下來一個月要待的床位" },
  { img: "images/IMG_0417.jpeg", title: "工作室地點樓下的小貓，總是出現在甜點店前附近的位置" },
  { img: "images/IMG_0412.jpeg", title: "這個月坐工作室的位置，可以直接看到港口" },
  { img: "images/IMG_0413.jpeg", title: "工作室牆上有好多海報" },
  { img: "images/IMG_0430.jpeg", title: "從宿舍看出去的樣子" },
  { img: "images/IMG_0440.jpeg", title: "第一天晚上的港邊散步" },
  { img: "images/IMG_0437.jpeg", title: "第一天的晚餐" }
];

const container = document.getElementById("container");
const isMobile = window.innerWidth < 768;
const cardWidth = isMobile ? 160 : 260;
const cardHeight = isMobile ? 140 : 220;
const padding = 40; 
const positions = ["pos-top-left", "pos-top-right", "pos-bottom-left", "pos-bottom-right"];

let placedBoxes = [];

// 初始化固定卡片 (立刻出現)
document.querySelectorAll('.card.fixed').forEach(card => {
  placedBoxes.push({
    left: card.offsetLeft - padding,
    right: card.offsetLeft + cardWidth + padding,
    top: card.offsetTop - padding,
    bottom: card.offsetTop + cardHeight + padding
  });
  card.addEventListener('click', toggleCard);
});

// 生成隨機卡片
projectData.forEach((item, i) => {
  const card = document.createElement("div");
  card.className = "card random"; // 加上 random class
  const randomPos = positions[Math.floor(Math.random() * positions.length)];

  card.innerHTML = `
    <img src="${item.img}" loading="lazy">
    <div class="overlay ${randomPos}">${item.title}</div>
  `;

  card.addEventListener('click', toggleCard);
  container.appendChild(card);

  // 💡 優化：確保隨機圖片載入後才淡入 (解決圖片跑得慢的問題)
  const imgElement = card.querySelector('img');
  imgElement.onload = () => {
    card.style.opacity = "1";
  };

  // 隨機排版
  let placedOK = false;
  let tries = 0;
  const safeLeft = isMobile ? 15 : 100;
  const safeTop = isMobile ? 400 : 450;

  while (!placedOK && tries < 500) {
    let section = Math.floor(i / (isMobile ? 2 : 3)); 
    let x = safeLeft + Math.random() * (window.innerWidth - cardWidth - (safeLeft * 2));
    let y = safeTop + (section * (isMobile ? 240 : 380)) + (Math.random() * 120);

    let newBox = {
      left: x - padding,
      right: x + cardWidth + padding,
      top: y - padding,
      bottom: y + cardHeight + padding
    };

    let collide = placedBoxes.some(box => {
      return !(newBox.right < box.left || newBox.left > box.right || 
               newBox.bottom < box.top || newBox.top > box.bottom);
    });

    if (!collide || tries === 499) {
      placedOK = true;
      let rotate = (Math.random() - 0.5) * (isMobile ? 10 : 18);
      card.style.left = x + "px";
      card.style.top = y + "px";
      card.style.transform = `rotate(${rotate}deg)`;
      placedBoxes.push(newBox);
    }
    tries++;
  }
});

function toggleCard(e) {
  e.stopPropagation();
  const isActive = this.classList.contains('active');
  closeAll();
  if (!isActive) this.classList.add('active');
}

function closeAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

document.addEventListener('click', closeAll);

const maxBottom = Math.max(...placedBoxes.map(b => b.bottom), window.innerHeight);
container.style.height = (maxBottom + 150) + "px";

</script>
</body>
</html>
